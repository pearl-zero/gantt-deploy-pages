<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arwen-gantt</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0;padding:0;background:#ffffff">
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const INITIAL_STEPS = [
  { id:1, label:"STEP 1", title:"지도 작업", desc:"데이터 관리, 업데이트 자동화", month:1, duration:1, color:"#16A34A" },
  { id:2, label:"STEP 2", title:"코드 구조 분석", desc:"코드 리스트업, 중복 로직 파악", month:1, duration:2, color:"#2563EB" },
  { id:3, label:"STEP 3", title:"유니크|MECE 작업", desc:"중복 로직 제거, 카테고리화", month:2, duration:3, color:"#DB2777" },
  { id:4, label:"STEP 4", title:"실행 구조 통합", desc:"전체 스케줄 관리 · 각 job 실행 연결", month:3, duration:2, color:"#D97706" },
  { id:5, label:"STEP 5", title:"Main.py 생성", desc:"start python × → python main.py ○", month:4, duration:1, color:"#7C3AED" },
  { id:6, label:"STEP 6", title:"로그 시스템", desc:"logging 설정 · app.log 기록 · 에러 추적", month:4, duration:2, color:"#0891B2" },
  { id:7, label:"STEP 7", title:"안정성 개선", desc:"try/except · 에러 로그 · 재시도 로직", month:5, duration:2, color:"#EA580C" },
];

const TOTAL_MONTHS = 12;
const MONTHS = Array.from({ length: TOTAL_MONTHS }, (_, i) => i + 1);

const STATUS_OPTIONS = ["대기", "진행중", "완료"];
const STATUS_STYLES = {
  대기: { bg:"#F3F4F6", text:"#9CA3AF", border:"#E5E7EB" },
  진행중: { bg:"#FEF9C3", text:"#CA8A04", border:"#FDE047" },
  완료: { bg:"#DCFCE7", text:"#16A34A", border:"#86EFAC" },
};

const COLOR_OPTIONS = [
  "#16A34A", "#2563EB", "#DB2777", "#D97706",
  "#7C3AED", "#0891B2", "#EA580C", "#DC2626",
  "#0F766E", "#4338CA", "#65A30D", "#BE185D"
];

const EditableText = ({ value, onChange, style, multiline }) => {
  const [editing, setEditing] = useState(false);

  const commonStyle = {
    ...style,
    background:"transparent",
    border:"none",
    borderBottom:"1.5px dashed #D1D5DB",
    outline:"none",
    fontFamily:"inherit",
    cursor:"pointer",
    padding:"0 2px",
    width:"100%",
    boxSizing:"border-box"
  };

  if (editing) {
    if (multiline) {
      return (
        <textarea
          autoFocus
          value={value}
          onChange={e => onChange(e.target.value)}
          onBlur={() => setEditing(false)}
          style={{
            ...commonStyle,
            resize:"none",
            minHeight:36,
            fontSize:style?.fontSize,
            lineHeight:1.5
          }}
        />
      );
    }

    return (
      <input
        autoFocus
        value={value}
        onChange={e => onChange(e.target.value)}
        onBlur={() => setEditing(false)}
        onKeyDown={e => e.key === "Enter" && setEditing(false)}
        style={{ ...commonStyle, display:"inline-block" }}
      />
    );
  }

  return (
    <span
      onClick={() => setEditing(true)}
      title="클릭해서 수정"
      style={{ ...style, borderBottom:"1px dashed #D1D5DB", cursor:"pointer", paddingBottom:1 }}
    >
      {value}
    </span>
  );
};

function GanttApp() {
  const [steps, setSteps] = useState(INITIAL_STEPS);
  const [statuses, setStatuses] = useState(
    Object.fromEntries(INITIAL_STEPS.map(s => [s.id, "대기"]))
  );
  const [notes, setNotes] = useState(
    Object.fromEntries(INITIAL_STEPS.map(s => [s.id, ""]))
  );
  const [editingNote, setEditingNote] = useState(null);
  const [projectTitle, setProjectTitle] = useState("🏗️ 구조 개선 프로젝트");
  const [projectDesc, setProjectDesc] = useState("observer.bat → main.py 단일 실행 구조 전환");

  const [showAddForm, setShowAddForm] = useState(false);
  const [newStep, setNewStep] = useState({
    title: "",
    desc: "",
    month: 1,
    duration: 1,
    color: COLOR_OPTIONS[0],
  });

  const cycleStatus = (id) => {
    setStatuses(prev => {
      const cur = STATUS_OPTIONS.indexOf(prev[id]);
      return { ...prev, [id]: STATUS_OPTIONS[(cur + 1) % STATUS_OPTIONS.length] };
    });
  };

  const updateStep = (id, field, value) => {
    setSteps(prev => prev.map(s => s.id === id ? { ...s, [field]: value } : s));
  };

  const updateStepNum = (id, field, value) => {
    const num = parseInt(value, 10);
    if (!isNaN(num) && num >= 1 && num <= TOTAL_MONTHS) {
      updateStep(id, field, num);
    }
  };

  const updateNewStepNum = (field, value) => {
    const num = parseInt(value, 10);
    if (!isNaN(num) && num >= 1 && num <= TOTAL_MONTHS) {
      setNewStep(prev => ({ ...prev, [field]: num }));
    }
  };

  const addStep = () => {
    const title = newStep.title.trim();
    const desc = newStep.desc.trim();

    if (!title) {
      alert("Step 제목을 입력해주세요.");
      return;
    }

    const nextNumber = steps.length + 1;
    const newId = steps.length ? Math.max(...steps.map(s => s.id)) + 1 : 1;

    const stepToAdd = {
      id: newId,
      label: `STEP ${nextNumber}`,
      title,
      desc,
      month: Math.min(Math.max(Number(newStep.month) || 1, 1), TOTAL_MONTHS),
      duration: Math.min(Math.max(Number(newStep.duration) || 1, 1), TOTAL_MONTHS),
      color: newStep.color || COLOR_OPTIONS[0],
    };

    setSteps(prev => [...prev, stepToAdd]);
    setStatuses(prev => ({ ...prev, [newId]: "대기" }));
    setNotes(prev => ({ ...prev, [newId]: "" }));
    setNewStep({
      title: "",
      desc: "",
      month: 1,
      duration: 1,
      color: COLOR_OPTIONS[(nextNumber) % COLOR_OPTIONS.length],
    });
    setShowAddForm(false);
  };

  const completedCount = Object.values(statuses).filter(s => s === "완료").length;
  const progress = steps.length ? Math.round((completedCount / steps.length) * 100) : 0;

  return (
    <div style={{ minHeight:"100vh", background:"#ffffff", color:"#111827", fontFamily:"'DM Mono','Courier New',monospace", padding:0 }}>

      <div style={{ borderBottom:"1px solid #E5E7EB", padding:"28px 24px 20px", background:"#F9FAFB" }}>
        <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", flexWrap:"wrap", gap:12 }}>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:10, letterSpacing:"0.2em", color:"#9CA3AF", marginBottom:6, textTransform:"uppercase" }}>
              PROJECT / PYTHON AUTOMATION
            </div>
            <EditableText
              value={projectTitle}
              onChange={setProjectTitle}
              style={{ fontSize:"clamp(16px,4vw,22px)", fontWeight:700, color:"#111827", display:"block" }}
            />
            <EditableText
              value={projectDesc}
              onChange={setProjectDesc}
              style={{ fontSize:12, color:"#9CA3AF", display:"block", marginTop:6 }}
            />
          </div>

          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:28, fontWeight:700, color:progress===100?"#16A34A":"#111827", letterSpacing:"-0.04em" }}>
              {progress}<span style={{ fontSize:14, color:"#9CA3AF" }}>%</span>
            </div>
            <div style={{ fontSize:10, color:"#9CA3AF" }}>{completedCount}/{steps.length} DONE</div>
          </div>
        </div>

        <div style={{ marginTop:16, height:4, background:"#E5E7EB", borderRadius:2, overflow:"hidden" }}>
          <div
            style={{
              height:"100%",
              width:`${progress}%`,
              background:progress===100?"#16A34A":"linear-gradient(90deg,#2563EB,#7C3AED)",
              borderRadius:2,
              transition:"width 0.5s ease"
            }}
          />
        </div>
      </div>

      <div style={{ padding:"20px 16px 0" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:12, flexWrap:"wrap", marginBottom:12 }}>
          <div style={{ fontSize:10, letterSpacing:"0.15em", color:"#9CA3AF", textTransform:"uppercase" }}>
            — Gantt Chart
          </div>

          <button
            onClick={() => setShowAddForm(prev => !prev)}
            style={{
              padding:"8px 12px",
              borderRadius:6,
              border:"1px solid #D1D5DB",
              background:"#111827",
              color:"#ffffff",
              fontSize:11,
              cursor:"pointer",
              fontFamily:"inherit"
            }}
          >
            {showAddForm ? "닫기" : "+ Add Step"}
          </button>
        </div>

        {showAddForm && (
          <div style={{
            marginBottom:16,
            padding:"14px",
            border:"1px solid #E5E7EB",
            borderRadius:10,
            background:"#FAFAFA"
          }}>
            <div style={{ fontSize:10, color:"#9CA3AF", marginBottom:10, textTransform:"uppercase", letterSpacing:"0.12em" }}>
              New Step
            </div>

            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))", gap:10 }}>
              <div>
                <div style={{ fontSize:10, color:"#6B7280", marginBottom:4 }}>제목</div>
                <input
                  value={newStep.title}
                  onChange={e => setNewStep(prev => ({ ...prev, title:e.target.value }))}
                  placeholder="예: 배포 자동화"
                  style={{
                    width:"100%",
                    boxSizing:"border-box",
                    padding:"8px 10px",
                    border:"1px solid #D1D5DB",
                    borderRadius:6,
                    background:"#fff",
                    outline:"none",
                    fontFamily:"inherit",
                    fontSize:12
                  }}
                />
              </div>

              <div>
                <div style={{ fontSize:10, color:"#6B7280", marginBottom:4 }}>설명</div>
                <input
                  value={newStep.desc}
                  onChange={e => setNewStep(prev => ({ ...prev, desc:e.target.value }))}
                  placeholder="예: 배포 스크립트 정리 및 실행 검증"
                  style={{
                    width:"100%",
                    boxSizing:"border-box",
                    padding:"8px 10px",
                    border:"1px solid #D1D5DB",
                    borderRadius:6,
                    background:"#fff",
                    outline:"none",
                    fontFamily:"inherit",
                    fontSize:12
                  }}
                />
              </div>

              <div>
                <div style={{ fontSize:10, color:"#6B7280", marginBottom:4 }}>시작 월</div>
                <input
                  type="number"
                  min="1"
                  max={TOTAL_MONTHS}
                  value={newStep.month}
                  onChange={e => updateNewStepNum("month", e.target.value)}
                  style={{
                    width:"100%",
                    boxSizing:"border-box",
                    padding:"8px 10px",
                    border:"1px solid #D1D5DB",
                    borderRadius:6,
                    background:"#fff",
                    outline:"none",
                    fontFamily:"inherit",
                    fontSize:12
                  }}
                />
              </div>

              <div>
                <div style={{ fontSize:10, color:"#6B7280", marginBottom:4 }}>기간(월)</div>
                <input
                  type="number"
                  min="1"
                  max={TOTAL_MONTHS}
                  value={newStep.duration}
                  onChange={e => updateNewStepNum("duration", e.target.value)}
                  style={{
                    width:"100%",
                    boxSizing:"border-box",
                    padding:"8px 10px",
                    border:"1px solid #D1D5DB",
                    borderRadius:6,
                    background:"#fff",
                    outline:"none",
                    fontFamily:"inherit",
                    fontSize:12
                  }}
                />
              </div>

              <div>
                <div style={{ fontSize:10, color:"#6B7280", marginBottom:4 }}>색상</div>
                <select
                  value={newStep.color}
                  onChange={e => setNewStep(prev => ({ ...prev, color:e.target.value }))}
                  style={{
                    width:"100%",
                    boxSizing:"border-box",
                    padding:"8px 10px",
                    border:"1px solid #D1D5DB",
                    borderRadius:6,
                    background:"#fff",
                    outline:"none",
                    fontFamily:"inherit",
                    fontSize:12
                  }}
                >
                  {COLOR_OPTIONS.map(color => (
                    <option key={color} value={color}>{color}</option>
                  ))}
                </select>
              </div>
            </div>

            <div style={{ display:"flex", gap:8, marginTop:12, flexWrap:"wrap" }}>
              {COLOR_OPTIONS.map(color => (
                <button
                  key={color}
                  onClick={() => setNewStep(prev => ({ ...prev, color }))}
                  style={{
                    width:24,
                    height:24,
                    borderRadius:"50%",
                    border:newStep.color === color ? "2px solid #111827" : "1px solid #D1D5DB",
                    background:color,
                    cursor:"pointer"
                  }}
                  title={color}
                />
              ))}
            </div>

            <div style={{ display:"flex", justifyContent:"flex-end", gap:8, marginTop:14 }}>
              <button
                onClick={() => setShowAddForm(false)}
                style={{
                  padding:"8px 12px",
                  borderRadius:6,
                  border:"1px solid #D1D5DB",
                  background:"#fff",
                  color:"#111827",
                  fontSize:11,
                  cursor:"pointer",
                  fontFamily:"inherit"
                }}
              >
                취소
              </button>
              <button
                onClick={addStep}
                style={{
                  padding:"8px 12px",
                  borderRadius:6,
                  border:"1px solid #111827",
                  background:"#111827",
                  color:"#fff",
                  fontSize:11,
                  cursor:"pointer",
                  fontFamily:"inherit"
                }}
              >
                Step 추가
              </button>
            </div>
          </div>
        )}

        <div style={{ display:"grid", gridTemplateColumns:"120px 1fr", marginBottom:4 }}>
          <div />
          <div style={{ display:"grid", gridTemplateColumns:`repeat(${TOTAL_MONTHS},1fr)` }}>
            {MONTHS.map(month => (
              <div
                key={month}
                style={{ textAlign:"center", fontSize:9, color:"#9CA3AF", paddingBottom:6, borderBottom:"1px solid #E5E7EB" }}
              >
                M{month}
              </div>
            ))}
          </div>
        </div>

        {steps.map(step => {
          const st = statuses[step.id];
          const style = STATUS_STYLES[st];

          return (
            <div
              key={step.id}
              style={{ display:"grid", gridTemplateColumns:"120px 1fr", marginBottom:6, opacity:st==="대기"?0.6:1, transition:"opacity 0.2s" }}
            >
              <div style={{ display:"flex", alignItems:"center", gap:6, paddingRight:8 }}>
                <button
                  onClick={() => cycleStatus(step.id)}
                  style={{
                    padding:"2px 7px",
                    borderRadius:3,
                    border:`1px solid ${style.border}`,
                    background:style.bg,
                    color:style.text,
                    fontSize:9,
                    cursor:"pointer",
                    whiteSpace:"nowrap",
                    fontFamily:"inherit"
                  }}
                >
                  {st}
                </button>
                <span style={{ fontSize:9, color:"#9CA3AF", whiteSpace:"nowrap" }}>{step.label}</span>
              </div>

              <div style={{ display:"grid", gridTemplateColumns:`repeat(${TOTAL_MONTHS},1fr)` }}>
                {MONTHS.map(month => {
                  const inRange = month >= step.month && month < step.month + step.duration;
                  const isFirst = month === step.month;
                  const isLast = month === step.month + step.duration - 1;

                  return (
                    <div
                      key={month}
                      style={{
                        height:28,
                        background:inRange
                          ? (st==="완료"
                              ? `${step.color}22`
                              : st==="진행중"
                              ? `${step.color}15`
                              : "#F3F4F6")
                          : "transparent",
                        borderTop:inRange ? `2px solid ${st!=="대기"?step.color:"#D1D5DB"}` : "2px solid transparent",
                        borderLeft:inRange && isFirst ? `2px solid ${st!=="대기"?step.color:"#D1D5DB"}` : "none",
                        borderRight:inRange && isLast ? `2px solid ${st!=="대기"?step.color:"#D1D5DB"}` : "none",
                        borderBottom:inRange ? `2px solid ${st!=="대기"?step.color:"#D1D5DB"}` : "2px solid transparent",
                        borderRadius:isFirst && isLast ? 4 : isFirst ? "4px 0 0 4px" : isLast ? "0 4px 4px 0" : 0,
                        display:"flex",
                        alignItems:"center",
                        paddingLeft:isFirst ? 6 : 0,
                        overflow:"hidden",
                        boxSizing:"border-box"
                      }}
                    >
                      {inRange && isFirst && (
                        <span
                          style={{
                            fontSize:9,
                            fontWeight:600,
                            color:st!=="대기"?step.color:"#9CA3AF",
                            whiteSpace:"nowrap",
                            overflow:"hidden",
                            textOverflow:"ellipsis"
                          }}
                        >
                          {st==="완료" ? "✓ " : st==="진행중" ? "▶ " : ""}
                          {step.title}
                        </span>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ padding:"24px 16px 16px" }}>
        <div style={{ fontSize:10, letterSpacing:"0.15em", color:"#9CA3AF", marginBottom:12, textTransform:"uppercase" }}>
          — Step Details
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {steps.map(step => {
            const st = statuses[step.id];
            const style = STATUS_STYLES[st];
            const isEditing = editingNote === step.id;

            return (
              <div
                key={step.id}
                style={{ border:`1px solid ${st!=="대기"?step.color+"44":"#E5E7EB"}`, borderRadius:8, background:st==="완료"?`${step.color}08`:"#FAFAFA" }}
              >
                <div style={{ padding:"10px 14px", display:"flex", alignItems:"flex-start", gap:10 }}>
                  <div style={{ width:8, height:8, borderRadius:"50%", background:step.color, flexShrink:0, marginTop:4, opacity:st==="대기"?0.3:1 }} />
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap", marginBottom:4 }}>
                      <EditableText value={step.label} onChange={v => updateStep(step.id, "label", v)} style={{ fontSize:9, color:"#9CA3AF" }} />
                      <EditableText value={step.title} onChange={v => updateStep(step.id, "title", v)} style={{ fontSize:12, fontWeight:600, color:st==="완료"?step.color:"#111827" }} />
                    </div>

                    <EditableText
                      value={step.desc}
                      onChange={v => updateStep(step.id, "desc", v)}
                      multiline
                      style={{ fontSize:10, color:"#6B7280", display:"block" }}
                    />

                    <div style={{ display:"flex", gap:12, marginTop:6, fontSize:10, color:"#9CA3AF", alignItems:"center", flexWrap:"wrap" }}>
                      <span>시작 월:
                        <input
                          type="number"
                          min="1"
                          max={TOTAL_MONTHS}
                          value={step.month}
                          onChange={e => updateStepNum(step.id, "month", e.target.value)}
                          style={{
                            width:32,
                            marginLeft:4,
                            fontSize:10,
                            border:"none",
                            borderBottom:"1px dashed #D1D5DB",
                            background:"transparent",
                            outline:"none",
                            fontFamily:"inherit",
                            color:"#111827",
                            textAlign:"center"
                          }}
                        />
                      </span>
                      <span>기간(월):
                        <input
                          type="number"
                          min="1"
                          max={TOTAL_MONTHS}
                          value={step.duration}
                          onChange={e => updateStepNum(step.id, "duration", e.target.value)}
                          style={{
                            width:32,
                            marginLeft:4,
                            fontSize:10,
                            border:"none",
                            borderBottom:"1px dashed #D1D5DB",
                            background:"transparent",
                            outline:"none",
                            fontFamily:"inherit",
                            color:"#111827",
                            textAlign:"center"
                          }}
                        />
                      </span>
                    </div>

                    {notes[step.id] && !isEditing && (
                      <div style={{ marginTop:6, fontSize:10, color:"#6B7280", background:"#F3F4F6", borderRadius:4, padding:"4px 8px", borderLeft:`2px solid ${step.color}` }}>
                        {notes[step.id]}
                      </div>
                    )}

                    {isEditing && (
                      <textarea
                        autoFocus
                        value={notes[step.id]}
                        onChange={e => setNotes(p => ({ ...p, [step.id]:e.target.value }))}
                        onBlur={() => setEditingNote(null)}
                        placeholder="메모 입력..."
                        style={{
                          marginTop:6,
                          width:"100%",
                          background:"#F9FAFB",
                          border:`1px solid ${step.color}`,
                          borderRadius:4,
                          padding:"6px 8px",
                          color:"#111827",
                          fontSize:11,
                          fontFamily:"inherit",
                          resize:"vertical",
                          minHeight:50,
                          outline:"none",
                          boxSizing:"border-box"
                        }}
                      />
                    )}
                  </div>

                  <div style={{ display:"flex", gap:6, flexShrink:0 }}>
                    <button
                      onClick={() => setEditingNote(isEditing ? null : step.id)}
                      style={{
                        width:24,
                        height:24,
                        borderRadius:4,
                        border:"1px solid #E5E7EB",
                        background:"transparent",
                        fontSize:11,
                        cursor:"pointer",
                        display:"flex",
                        alignItems:"center",
                        justifyContent:"center"
                      }}
                    >
                      ✏️
                    </button>
                    <button
                      onClick={() => cycleStatus(step.id)}
                      style={{
                        padding:"3px 8px",
                        borderRadius:4,
                        border:`1px solid ${style.border}`,
                        background:style.bg,
                        color:style.text,
                        fontSize:9,
                        cursor:"pointer",
                        whiteSpace:"nowrap",
                        fontFamily:"inherit"
                      }}
                    >
                      {st}
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ margin:"8px 16px 24px", padding:"12px 14px", borderRadius:8, background:"#F9FAFB", border:"1px solid #E5E7EB", fontSize:10, color:"#9CA3AF", lineHeight:1.8 }}>
        <span style={{ color:"#6B7280" }}>🔥 핵심 원칙</span><br />
        스케줄은 main.py에서만 · 실행은 하나의 프로세스 · 로그는 반드시 파일로 · 구조는 단순하게
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<GanttApp />);
</script>
